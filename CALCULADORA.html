<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Calculator</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>

  <body>
    <div class="wrapper">
      <div class="calculator">
        <input type="text" id="screen" value="0" readonly />

        <div class="buttons">
          <button class="btn-func" onclick="clearAll()">C</button>
          <button class="btn-func" onclick="deleteLast()">Delete</button>
          <button class="btn-op" onclick="add('/')">÷</button>
          <button class="btn-op" onclick="add('+')">+</button>

          <button class="btn-num" onclick="add('7')">7</button>
          <button class="btn-num" onclick="add('8')">8</button>
          <button class="btn-num" onclick="add('9')">9</button>
          <button class="btn-op" onclick="add('-')">-</button>

          <button class="btn-num" onclick="add('4')">4</button>
          <button class="btn-num" onclick="add('5')">5</button>
          <button class="btn-num" onclick="add('6')">6</button>
          <button class="btn-op" onclick="add('*')">x</button>

          <button class="btn-num" onclick="add('1')">1</button>
          <button class="btn-num" onclick="add('2')">2</button>
          <button class="btn-num" onclick="add('3')">3</button>
          <button class="btn-op" onclick="add('.')">.</button>

          <button class="btn-num btn-zero" onclick="add('0')">0</button>
          <button class="btn-equal" onclick="calculate()">=</button>

          <div class="overlay" id="overlay"></div>
        </div>
      </div>

      <div class="switch-box">
        <span>Teclado</span>
        <label class="switch">
          <input
            type="checkbox"
            id="keyboardToggle"
            onchange="toggleKeyboardMode()"
          />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <script src="codigo.js"></script>
  </body>
</html>
